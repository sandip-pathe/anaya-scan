name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check anaya/ cli/ tests/
          ruff format --check anaya/ cli/ tests/

      - name: Type check
        run: echo "Type checking (via Pylance in VSCode)"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: anaya
          POSTGRES_PASSWORD: anaya
          POSTGRES_DB: anaya
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          GITHUB_APP_ID: test
          GITHUB_WEBHOOK_SECRET: test
          DATABASE_URL: postgresql+asyncpg://anaya:anaya@localhost:5432/anaya
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ -v --cov=anaya --cov=cli --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install AnaYa
        run: pip install -e .

      - name: Self-scan for violations
        run: |
          anaya scan . \
            --pack generic/secrets-detection \
            --pack generic/owasp-top10 \
            --fail-on CRITICAL
        continue-on-error: true
