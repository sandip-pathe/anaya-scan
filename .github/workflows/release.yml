name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write        # GitHub Release
  id-token: write        # PyPI Trusted Publisher (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # environment: release  # Uncomment after setting up trusted publisher at pypi.org/manage/account/publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        run: |
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
        env:
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install

            ```bash
            pip install anaya==${{ github.ref_name }}
            ```

            See [CHANGELOG.md](https://github.com/sandip-pathe/anaya-scan/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker push is optional — add DOCKERHUB_USERNAME, DOCKERHUB_TOKEN secrets to enable
