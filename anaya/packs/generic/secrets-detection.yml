manifest:
  id: "generic/secrets-detection"
  version: "1.0.0"
  name: "Secrets Detection"
  description: "Detects hardcoded secrets, API keys, tokens, and credentials in source code"
  last_updated: "2026-02-21"
  sources:
    - "https://cwe.mitre.org/data/definitions/798.html"
    - "https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/"
  changelog:
    - version: "1.0.0"
      date: "2026-02-21"
      notes: "Initial release with 12 rules"

rules:
  # ── 1. Hardcoded API Key ─────────────────────────────────
  - id: "no-hardcoded-api-key"
    name: "No Hardcoded API Keys"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "Hardcoded API key detected at {file}:{line}"
    fix_hint: "Store API keys in environment variables or a secrets manager (e.g., AWS Secrets Manager, HashiCorp Vault)"
    references:
      - "https://cwe.mitre.org/data/definitions/798.html"
    tags:
      - secrets
      - cwe-798
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - '(?i)(?:api[_-]?key|apikey)\s*=\s*["\x27][A-Za-z0-9_\-/.]{8,}["\x27]'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'config\.'
      - 'settings\.'

  # ── 2. Hardcoded AWS Access Key ──────────────────────────
  - id: "no-hardcoded-aws-key"
    name: "No Hardcoded AWS Access Keys"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "AWS access key ID detected at {file}:{line}"
    fix_hint: "Use IAM roles, instance profiles, or environment variables for AWS credentials"
    references:
      - "https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html"
    tags:
      - secrets
      - aws
      - cwe-798
    languages:
      - "*"
    patterns:
      - '(?<![A-Z0-9])AKIA[0-9A-Z]{16}(?![A-Z0-9])'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'example'

  # ── 3. Hardcoded AWS Secret Key ──────────────────────────
  - id: "no-hardcoded-aws-secret"
    name: "No Hardcoded AWS Secret Keys"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "AWS secret access key detected at {file}:{line}"
    fix_hint: "Use IAM roles, instance profiles, or environment variables for AWS credentials"
    references:
      - "https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html"
    tags:
      - secrets
      - aws
      - cwe-798
    languages:
      - "*"
    patterns:
      - '(?i)(?:aws[_-]?secret[_-]?(?:access[_-]?)?key)\s*=\s*["\x27][A-Za-z0-9/+=]{30,}["\x27]'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'

  # ── 4. GitHub Token ──────────────────────────────────────
  - id: "no-github-token"
    name: "No Hardcoded GitHub Tokens"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "GitHub personal access token detected at {file}:{line}"
    fix_hint: "Use GITHUB_TOKEN environment variable or GitHub App installation tokens"
    references:
      - "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
    tags:
      - secrets
      - github
      - cwe-798
    languages:
      - "*"
    patterns:
      - 'gh[ps]_[A-Za-z0-9_]{36,}'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'

  # ── 5. PEM Private Key ──────────────────────────────────
  - id: "no-private-key-pem"
    name: "No Embedded Private Keys"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "Private key block found at {file}:{line}"
    fix_hint: "Store private keys in files outside the repository, use .gitignore, or use a key vault"
    references:
      - "https://cwe.mitre.org/data/definitions/321.html"
    tags:
      - secrets
      - crypto
      - cwe-321
    languages:
      - "*"
    patterns:
      - '-----BEGIN\s+(?:RSA\s+|EC\s+|DSA\s+|OPENSSH\s+)?PRIVATE\s+KEY-----'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'test_data'

  # ── 6. Stripe Key ────────────────────────────────────────
  - id: "no-stripe-key"
    name: "No Hardcoded Stripe Keys"
    type: pattern
    severity: CRITICAL
    enabled: true
    message: "Stripe API key detected at {file}:{line}"
    fix_hint: "Use environment variables for Stripe API keys"
    references:
      - "https://docs.stripe.com/keys"
    tags:
      - secrets
      - stripe
      - cwe-798
    languages:
      - "*"
    patterns:
      - 'sk_(?:live|test)_[A-Za-z0-9]{20,}'
      - 'rk_(?:live|test)_[A-Za-z0-9]{20,}'
      - 'pk_(?:live|test)_[A-Za-z0-9]{20,}'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'

  # ── 7. Slack Webhook ─────────────────────────────────────
  - id: "no-slack-webhook"
    name: "No Hardcoded Slack Webhooks"
    type: pattern
    severity: HIGH
    enabled: true
    message: "Slack webhook URL detected at {file}:{line}"
    fix_hint: "Store Slack webhook URLs in environment variables"
    references:
      - "https://api.slack.com/messaging/webhooks"
    tags:
      - secrets
      - slack
      - cwe-798
    languages:
      - "*"
    patterns:
      - 'https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'

  # ── 8. Database URL with Password ───────────────────────
  - id: "no-database-url-password"
    name: "No Database URLs with Inline Passwords"
    type: pattern
    severity: HIGH
    enabled: true
    message: "Database connection string with embedded password at {file}:{line}"
    fix_hint: "Use DATABASE_URL environment variable or separate credential management"
    references:
      - "https://cwe.mitre.org/data/definitions/798.html"
    tags:
      - secrets
      - database
      - cwe-798
    languages:
      - "*"
    patterns:
      - '(?i)(?:postgres(?:ql)?|mysql|mongo(?:db)?|redis|amqp)://[^:]+:[^@\s]+@[^\s]+'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'localhost'
      - '127\.0\.0\.1'
      - 'example\.com'

  # ── 9. JWT Secret ────────────────────────────────────────
  - id: "no-jwt-secret"
    name: "No Hardcoded JWT Secrets"
    type: pattern
    severity: HIGH
    enabled: true
    message: "Hardcoded JWT secret detected at {file}:{line}"
    fix_hint: "Use environment variables or key management services for JWT secrets"
    references:
      - "https://cwe.mitre.org/data/definitions/798.html"
    tags:
      - secrets
      - jwt
      - cwe-798
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - '(?i)(?:jwt[_-]?secret|secret[_-]?key)\s*=\s*["\x27][A-Za-z0-9_\-/.]{10,}["\x27]'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'config\.'
      - 'settings\.'

  # ── 10. Password in URL ─────────────────────────────────
  - id: "no-password-in-url"
    name: "No Passwords in URLs"
    type: pattern
    severity: HIGH
    enabled: true
    message: "Password embedded in URL at {file}:{line}"
    fix_hint: "Use environment variables and pass credentials through headers or config"
    references:
      - "https://cwe.mitre.org/data/definitions/522.html"
    tags:
      - secrets
      - cwe-522
    languages:
      - "*"
    patterns:
      - 'https?://[^:]+:[^@\s]+@(?!localhost|127\.0\.0\.1)[^\s]+'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'example\.com'

  # ── 11. Hardcoded Password ──────────────────────────────
  - id: "no-hardcoded-password"
    name: "No Hardcoded Passwords"
    type: pattern
    severity: HIGH
    enabled: true
    message: "Hardcoded password detected at {file}:{line}"
    fix_hint: "Use environment variables or a secrets manager for passwords"
    references:
      - "https://cwe.mitre.org/data/definitions/798.html"
    tags:
      - secrets
      - cwe-798
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - '(?i)(?:password|passwd|pwd)\s*=\s*["\x27][^"\x27]{4,}["\x27]'
    exclude_patterns:
      - 'os\.getenv'
      - 'os\.environ'
      - 'environ\['
      - 'process\.env'
      - 'config\.'
      - 'getpass'
      - 'input\('
      - 'prompt'

  # ── 12. .env File Committed ─────────────────────────────
  - id: "no-env-file-committed"
    name: "No .env Files in Repository"
    type: pattern
    severity: MEDIUM
    enabled: true
    message: "Potential .env file content detected at {file}:{line}"
    fix_hint: "Add .env to .gitignore and use .env.example for documentation"
    references:
      - "https://12factor.net/config"
    tags:
      - secrets
      - config
      - cwe-798
    languages:
      - env
    patterns:
      - '^[A-Z_]+=.{3,}'
    exclude_patterns:
      - '\.example'
      - '\.sample'
      - 'template'
